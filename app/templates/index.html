<!DOCTYPE html>
<html>
<head>
    <title>Todo Cloud App</title>
</head>
<body>
    <h1>Aplikasi Todo List Berbasis Cloud Emulator</h1>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Masukkan tugas baru" required>
        <button type="submit">Tambah</button>
    </form>

    <h2>Daftar Tugas</h2>
    <ul>
        {% for todo in todos %}
            <li>{{ todo[1] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
